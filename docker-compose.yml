services:
  traefik:
    image: traefik:v3.0
    container_name: wa-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_acme:/acme
    networks:
      - wa-network
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID

  postgres:
    image: postgres:16-alpine
    container_name: wa-postgres
    restart: unless-stopped
    # NO EXTERNAL PORTS - internal network only
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wa_manager
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wa-network
    # PostgreSQL configuration for stable long-running connections
    command: >
      postgres
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=6
      -c idle_in_transaction_session_timeout=0
      -c statement_timeout=0
      -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - FOWNER

  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: unless-stopped
    # NO EXTERNAL PORTS - internal network only (safe without password)
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - wa-network
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Security hardening
    security_opt:
      - no-new-privileges:true

  wa-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # NO EXTERNAL PORTS - Traefik handles all traffic
    expose:
      - "3000"
      - "5001"
    environment:
      # Prisma connection pool: 10 connections (reduced to save memory)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wa_manager?schema=public&connection_limit=10&pool_timeout=10&connect_timeout=30
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/wa_manager?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
      NEXT_PUBLIC_USE_WEBSOCKET: ${NEXT_PUBLIC_USE_WEBSOCKET:-false}
      API_PORT: 5001
      API_SECRET_KEY: ${API_SECRET_KEY}
      NODE_ENV: production
      # Enable Node.js optimizations
      UV_THREADPOOL_SIZE: 4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wa-app.rule=Host(`ilovesanzhar.click`)"
      - "traefik.http.routers.wa-app.entrypoints=websecure"
      - "traefik.http.routers.wa-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wa-app.service=wa-app"
      - "traefik.http.services.wa-app.loadbalancer.server.port=3000"
      # WebSocket routing
      - "traefik.http.routers.wa-api.rule=Host(`ilovesanzhar.click`) && PathPrefix(`/api`, `/socket.io`)"
      - "traefik.http.routers.wa-api.entrypoints=websecure"
      - "traefik.http.routers.wa-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wa-api.service=wa-api"
      - "traefik.http.services.wa-api.loadbalancer.server.port=5001"
      - "traefik.http.services.wa-api.loadbalancer.sticky.cookie.name=server_id"
    volumes:
      - baileys_auth:/app/.baileys_auth
      - wa_logs:/app/logs
    networks:
      - wa-network
    # Graceful shutdown timeout (45 seconds)
    stop_grace_period: 45s
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf http://localhost:3000 -o /dev/null && curl -sf http://localhost:5001/health -o /dev/null",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    # Log rotation to prevent disk fill
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 6144M
        reservations:
          cpus: "0.5"
          memory: 3072M
      # Политика перезапуска при сбое
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 20
        window: 120s
    # Дополнительная безопасность
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Block malicious domains (virus protection)
    extra_hosts:
      - "repositorylinux.publicvm.com:127.0.0.1"
      - "publicvm.com:127.0.0.1"
      - "linux.publicvm.com:127.0.0.1"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  baileys_auth:
    driver: local
  wa_logs:
    driver: local
  traefik_acme:
    driver: local

networks:
  wa-network:
    driver: bridge
